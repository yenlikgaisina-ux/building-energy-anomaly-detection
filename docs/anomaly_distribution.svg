<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="#0d1117"/>
  <text x="400" y="35" text-anchor="middle" fill="#e6edf3" font-family="system-ui,sans-serif" font-size="17" font-weight="bold">Energy Consumption Distribution: Normal vs Anomalous Buildings</text>
  <text x="400" y="56" text-anchor="middle" fill="#8b949e" font-family="system-ui,sans-serif" font-size="12">kWh/m2/yr. Anomalous buildings consume 3-5x the median (dashed line).</text>
  <rect x="70" y="70" width="660" height="320" fill="#161b22" rx="4"/>
  <g stroke="#21262d" stroke-width="1">
    <line x1="70" y1="70" x2="730" y2="70"/><line x1="70" y1="138" x2="730" y2="138"/>
    <line x1="70" y1="206" x2="730" y2="206"/><line x1="70" y1="274" x2="730" y2="274"/>
    <line x1="70" y1="342" x2="730" y2="342"/><line x1="70" y1="390" x2="730" y2="390"/>
  </g>
  <g fill="#388bfd" opacity="0.7">
    <rect x="88" y="335" width="55" height="55"/><rect x="148" y="140" width="55" height="250"/>
    <rect x="208" y="230" width="55" height="160"/><rect x="268" y="295" width="55" height="95"/>
    <rect x="328" y="330" width="55" height="60"/><rect x="388" y="350" width="55" height="40"/>
    <rect x="448" y="362" width="55" height="28"/><rect x="508" y="370" width="55" height="20"/>
    <rect x="568" y="375" width="55" height="15"/>
  </g>
  <g fill="#f85149" opacity="0.85">
    <rect x="88" y="385" width="55" height="5"/><rect x="148" y="384" width="55" height="6"/>
    <rect x="208" y="378" width="55" height="12"/><rect x="268" y="360" width="55" height="30"/>
    <rect x="328" y="340" width="55" height="50"/><rect x="388" y="318" width="55" height="72"/>
    <rect x="448" y="330" width="55" height="60"/><rect x="508" y="345" width="55" height="45"/>
    <rect x="568" y="355" width="55" height="35"/>
  </g>
  <line x1="220" y1="70" x2="220" y2="390" stroke="#e3b341" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="224" y="90" fill="#e3b341" font-family="system-ui,sans-serif" font-size="11">Median: 124 kWh/m2/yr</text>
  <line x1="450" y1="70" x2="450" y2="390" stroke="#f85149" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="454" y="90" fill="#f85149" font-family="system-ui,sans-serif" font-size="11">Anomaly threshold</text>
  <text x="400" y="430" text-anchor="middle" fill="#8b949e" font-family="system-ui,sans-serif" font-size="13">Energy Consumption (kWh/m2/yr)</text>
  <text x="22" y="245" text-anchor="middle" fill="#8b949e" font-family="system-ui,sans-serif" font-size="13" transform="rotate(-90,22,245)">Number of Properties</text>
  <g fill="#8b949e" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">
    <text x="115" y="408">0-50</text><text x="175" y="408">50-100</text><text x="235" y="408">100-150</text>
    <text x="295" y="408">150-200</text><text x="355" y="408">200-250</text><text x="415" y="408">250-300</text>
    <text x="475" y="408">300-350</text><text x="535" y="408">350-400</text><text x="595" y="408">400+</text>
  </g>
  <rect x="565" y="82" width="155" height="65" fill="#21262d" rx="4" stroke="#30363d" stroke-width="1"/>
  <rect x="580" y="97" width="14" height="12" fill="#388bfd" opacity="0.7"/>
  <text x="600" y="108" fill="#e6edf3" font-family="system-ui,sans-serif" font-size="12">Normal buildings</text>
  <rect x="580" y="120" width="14" height="12" fill="#f85149" opacity="0.85"/>
  <text x="600" y="131" fill="#e6edf3" font-family="system-ui,sans-serif" font-size="12">Anomalous buildings</text>
</svg>
