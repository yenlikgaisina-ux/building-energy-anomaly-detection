<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#0d1117"/>
  <text x="400" y="35" text-anchor="middle" fill="#e6edf3" font-family="system-ui,sans-serif" font-size="17" font-weight="bold">Retrofit Prioritisation: Anomaly Rate by Construction Era and Wall Type</text>
  <text x="400" y="56" text-anchor="middle" fill="#8b949e" font-family="system-ui,sans-serif" font-size="12">% of buildings in each category flagged as anomalous. Highest = strongest retrofit priority.</text>
  <rect x="70" y="75" width="680" height="340" fill="#161b22" rx="4"/>
  <g stroke="#21262d" stroke-width="1">
    <line x1="70" y1="75" x2="750" y2="75"/><line x1="70" y1="143" x2="750" y2="143"/>
    <line x1="70" y1="211" x2="750" y2="211"/><line x1="70" y1="279" x2="750" y2="279"/>
    <line x1="70" y1="347" x2="750" y2="347"/><line x1="70" y1="415" x2="750" y2="415"/>
  </g>
  <g fill="#8b949e" font-family="system-ui,sans-serif" font-size="11" text-anchor="end">
    <text x="64" y="418">0%</text><text x="64" y="350">5%</text><text x="64" y="282">10%</text>
    <text x="64" y="214">15%</text><text x="64" y="146">20%</text><text x="64" y="78">25%</text>
  </g>
  <rect x="95" y="120" width="75" height="295" fill="#f85149" opacity="0.9" rx="2"/>
  <text x="132" y="112" text-anchor="middle" fill="#f85149" font-family="system-ui,sans-serif" font-size="12" font-weight="bold">22.1%</text>
  <rect x="205" y="154" width="75" height="261" fill="#f85149" opacity="0.75" rx="2"/>
  <text x="242" y="146" text-anchor="middle" fill="#f85149" font-family="system-ui,sans-serif" font-size="12" font-weight="bold">18.4%</text>
  <rect x="315" y="267" width="75" height="148" fill="#e3b341" opacity="0.85" rx="2"/>
  <text x="352" y="259" text-anchor="middle" fill="#e3b341" font-family="system-ui,sans-serif" font-size="12" font-weight="bold">11.0%</text>
  <rect x="425" y="320" width="75" height="95" fill="#e3b341" opacity="0.7" rx="2"/>
  <text x="462" y="312" text-anchor="middle" fill="#e3b341" font-family="system-ui,sans-serif" font-size="12" font-weight="bold">7.1%</text>
  <rect x="535" y="374" width="75" height="41" fill="#238636" opacity="0.85" rx="2"/>
  <text x="572" y="366" text-anchor="middle" fill="#238636" font-family="system-ui,sans-serif" font-size="12" font-weight="bold">3.1%</text>
  <rect x="645" y="401" width="75" height="14" fill="#238636" opacity="0.7" rx="2"/>
  <text x="682" y="393" text-anchor="middle" fill="#238636" font-family="system-ui,sans-serif" font-size="12" font-weight="bold">1.1%</text>
  <g fill="#8b949e" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle">
    <text x="132" y="432">Pre-1900</text><text x="242" y="432">1900-1929</text><text x="352" y="432">1930-1949</text>
    <text x="462" y="432">1950-1979</text><text x="572" y="432">1980-1999</text><text x="682" y="432">2000+</text>
  </g>
  <text x="400" y="458" text-anchor="middle" fill="#8b949e" font-family="system-ui,sans-serif" font-size="13">Construction Era</text>
  <text x="22" y="245" text-anchor="middle" fill="#8b949e" font-family="system-ui,sans-serif" font-size="13" transform="rotate(-90,22,245)">% Flagged as Anomalous</text>
  <g fill="#8b949e" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">
    <text x="132" y="468">Solid wall</text><text x="242" y="468">Solid wall</text>
    <text x="352" y="468">Cavity (uninsulated)</text><text x="462" y="468">Cavity (partial)</text>
    <text x="572" y="468">Cavity (insulated)</text><text x="682" y="468">Modern fabric</text>
  </g>
  <rect x="540" y="83" width="195" height="75" fill="#21262d" rx="4" stroke="#30363d" stroke-width="1"/>
  <rect x="555" y="98" width="14" height="12" fill="#f85149" opacity="0.85" rx="1"/>
  <text x="575" y="109" fill="#e6edf3" font-family="system-ui,sans-serif" font-size="12">High priority (&gt;15%)</text>
  <rect x="555" y="118" width="14" height="12" fill="#e3b341" opacity="0.85" rx="1"/>
  <text x="575" y="129" fill="#e6edf3" font-family="system-ui,sans-serif" font-size="12">Medium priority (5-15%)</text>
  <rect x="555" y="138" width="14" height="12" fill="#238636" opacity="0.85" rx="1"/>
  <text x="575" y="149" fill="#e6edf3" font-family="system-ui,sans-serif" font-size="12">Low priority (&lt;5%)</text>
</svg>
